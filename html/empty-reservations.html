<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 내역 없음 | AI Chat</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/tokens.css?v=20260628">
    <link rel="stylesheet" href="../css/components.css?v=20260628">
    <link rel="stylesheet" href="../css/chatbot.css?v=20260628">
  </head>
  <body class="twc-chatbot publish-shell state-page">
    <!-- 화면: 예약 내역 없음. 기능 ID: USER-SCR-06, USER-FE-07-004 -->
    <header class="twc-state-header flow-header state-header-title-center">
      <button class="twc-icon-btn twc-focus-ring" type="button" aria-label="뒤로가기" data-state-action="back">
        <img class="twc-icon twc-icon-md" src="../image/icon/icon-arrow-left.svg" alt="">
      </button>
      <h1 class="twc-h3">예약 확인</h1>
    </header>
    <main class="state-main">
      <section class="twc-content twc-state-card empty-lookup-card" aria-labelledby="reservationLookupTitle">
        <h2 class="twc-h4" id="reservationLookupTitle">예약 내역 조회</h2>
        <p class="twc-body">최근 1년간 접수된 방문 AS 예약을 조회합니다.</p>
      </section>
      <section class="twc-content state-hero">
        <div class="twc-empty-icon" aria-hidden="true"><img class="twc-icon twc-icon-xl" src="../image/icon/icon-empty-reservations-question.svg" alt=""></div>
        <h2 class="twc-h2">예약 내역이 없습니다</h2>
        <p>현재 진행 중인 방문 AS 예약이 없습니다.<br>제품 점검이 필요하다면 새 예약을 진행해주세요.</p>
      </section>
      <section class="twc-content twc-detail-list empty-reservation-detail-card" aria-label="조회 조건">
        <div class="twc-detail-row"><span>조회 기간</span><strong>최근 1년</strong></div>
        <div class="twc-detail-row"><span>예약 상태</span><strong>전체</strong></div>
      </section>
      <footer class="twc-content state-actions">
        <button class="twc-btn twc-btn-primary twc-focus-ring" type="button" data-state-action="navigate" data-state-href="chatbot.html#as-flow">방문 AS 예약하기</button>
        <button class="twc-btn twc-btn-secondary twc-focus-ring" type="button" data-state-action="chatbot">고객지원 홈으로</button>
      </footer>
    </main>
    <script src="../js/state.js"></script>
  </body>
</html>
