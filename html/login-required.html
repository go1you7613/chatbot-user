<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 필요 | AI Chat</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/tokens.css?v=20260628">
    <link rel="stylesheet" href="../css/components.css?v=20260628">
    <link rel="stylesheet" href="../css/chatbot.css?v=20260628">
  </head>
  <body class="twc-chatbot publish-shell state-page">
    <!-- 화면: 로그인 필요. 기능 ID: USER-SCR-03, USER-FE-10-002 -->
    <header class="twc-state-header flow-header state-header-title-center">
      <button class="twc-icon-btn twc-focus-ring" type="button" aria-label="뒤로가기" data-state-action="back">
        <img class="twc-icon twc-icon-md" src="../image/icon/icon-arrow-left.svg" alt="">
      </button>
      <h1 class="twc-h3">로그인 필요</h1>
    </header>
    <main class="state-main">
      <section class="twc-content state-hero">
        <div class="twc-status-icon" aria-hidden="true"><img class="twc-icon twc-icon-xl" src="../image/icon/icon-status-info.svg" alt=""></div>
        <h2 class="twc-h2">로그인이 필요합니다</h2>
        <p>보유제품, 예약 내역, 맞춤 추천을 확인하려면<br>아이나비 계정으로 로그인해주세요.</p>
      </section>
      <section class="twc-content twc-state-card login-benefit-card" aria-labelledby="loginBenefitTitle">
        <h3 class="twc-h4" id="loginBenefitTitle">로그인 후 이용 가능</h3>
        <ul class="answer-list">
          <li>보유제품 등록 및 관리</li>
          <li>방문 AS 예약 확인·변경</li>
          <li>제품별 소모품 추천</li>
          <li>커넥티드 서비스 안내</li>
        </ul>
      </section>
      <footer class="twc-content state-actions">
        <button class="twc-btn twc-btn-primary twc-focus-ring" type="button" data-state-action="navigate" data-state-href="chatbot.html#auth-flow">로그인하기</button>
        <button class="twc-btn twc-btn-secondary twc-focus-ring" type="button" data-state-action="chatbot">비회원으로 둘러보기</button>
      </footer>
    </main>
    <script src="../js/state.js"></script>
  </body>
</html>
